<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Bot</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="chatbot-icon">
    <img src="media/atlantis1.png" alt="bot">
  </div>

  <div id="chatbot-container">
    <div id="chatbot-header">
      <span>Plato</span>
      <button id="close-btn">
        <img src="media/close.png" alt="send">
      </button>
    </div>

    <div id="chatbot-body">
      <div id="chat-bg"></div>
      <div id="chatbot-messages"></div>
    </div>

    <div id="chatbot-input-container">
      <input id="chatbot-input" placeholder="Chat With Plato"  rows="1"></input>
      <button id="send-btn" disabled>
        <img src="media/send.png" alt="send">
      </button>
    </div>

  </div>
  <script src="chatbot.js"></script>
</body>

</html>
